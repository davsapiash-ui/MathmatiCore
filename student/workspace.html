<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מתמטיקאור — מרחב הפעילות</title>
  <meta name="description" content="מרחב הפעילות הדיגיטלי של מתמטיקאור — מפגש לימודי">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800;900&display=swap" rel="stylesheet">
  
  <!-- Bootstrap 5 RTL & FontAwesome -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" integrity="sha384-nU14brUcp6StFntEOOEBvcJm4huWjB0OcIeQ3fltAfSmuZFrkAif0T+UtNGlKKQv" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/workspace.css">
</head>
<body class="workspace-page bg-light">

  <!-- ── Premium Bootstrap Top Bar ── -->
  <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm sticky-top px-4 py-3">
    <div class="container-fluid">
      
      <!-- Brand & Logo -->
      <a class="navbar-brand d-flex align-items-center gap-2" href="#">
        <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold shadow-sm" style="width: 40px; height: 40px; font-size: 1.2rem;">מ</div>
        <span class="fw-black fs-4 text-dark" style="letter-spacing: -0.5px;">מתמטיקאור</span>
      </a>

      <!-- Progress Dots -->
      <div class="task-progress-dots mx-auto" id="task-progress-dots" role="progressbar" aria-label="התקדמות במשימות" aria-hidden="true"></div>

      <!-- Action Buttons -->
      <div class="d-flex align-items-center gap-3">
        
        <button id="btn-toggle-board" class="btn btn-outline-primary fw-bold rounded-pill shadow-sm d-flex align-items-center gap-2 px-3 py-2 transition-all">
          <i class="fa-solid fa-cubes"></i> פתח לוח קוביות
        </button>

        <button class="btn btn-light border fw-bold rounded-pill text-secondary d-flex align-items-center gap-2 px-3 py-2 transition-all" id="btn-undo" disabled aria-label="בטל פעולה אחרונה">
          <i class="fa-solid fa-rotate-left"></i> בטל
        </button>

        <button class="btn btn-outline-warning rounded-circle shadow-sm d-flex align-items-center justify-content-center" style="width: 42px; height: 42px;" id="help-request-btn" aria-label="בקש עזרה" title="לחץ לעזרה">
          <i class="fa-regular fa-lightbulb fs-5"></i>
        </button>

        <button class="btn btn-primary fw-bold rounded-pill shadow d-flex align-items-center gap-2 px-4 py-2 transition-all" id="btn-proceed" aria-label="עבור למשימה הבאה">
          הבא <i class="fa-solid fa-arrow-left"></i>
        </button>
        
        <!-- DEV SKIP -->
        <button id="btn-dev-skip" class="btn btn-danger fw-bolder rounded-pill px-3 py-2 shadow-sm d-flex align-items-center gap-2 ms-2">
          <i class="fa-solid fa-forward-step"></i> דלג
        </button>

        <div class="vr mx-2 text-secondary"></div>
        
        <!-- Student Info -->
        <span class="badge bg-light text-dark border border-secondary-subtle rounded-pill px-3 py-2 fs-6 fw-semibold shadow-sm" id="student-name-badge">
          <i class="fa-solid fa-user-graduate text-primary ms-1"></i> תלמיד
        </span>
      </div>
      
    </div>
  </nav>

  <!-- ── Main Workspace ── -->
  <main class="workspace-content" role="main">

    <!-- Task Instruction Card (Exercise Area 60%) -->
    <div class="task-card shadow-lg border-0 bg-white" id="task-card">
      <p class="task-session-label text-primary fw-bold text-uppercase mb-2" style="font-size: 1rem; letter-spacing: 0.5px;" id="task-session-label">מפגש 1</p>
      <h1 class="task-title display-6 fw-bolder text-dark mb-3" id="task-title">טוענים...</h1>
      <p class="task-instruction fs-4 text-secondary lh-lg mb-4 fw-medium" id="task-instruction"></p>

      <!-- Large number display (hidden when not needed) -->
      <div class="task-number-display hidden d-none text-center text-primary fw-black display-1 my-4 p-4 bg-primary bg-opacity-10 rounded-4 shadow-sm mx-auto" style="max-width: max-content; letter-spacing: 5px;" id="task-number-display" aria-live="polite"></div>

      <!-- Dynamic task body (choices / number line / addition / etc.) -->
      <div id="task-body" class="mt-4"></div>
    </div>

    <!-- ── Place Value Mathematical Structure (בית המספרים) ──
         This is the MATHEMATICAL PLACE VALUE STRUCTURE
         rendered as 4 interactive columns.
         Column order (RTL): יחידות (right) → אלפים (left)
         ── -->
    <div class="place-value-structure" id="place-value-structure" aria-label="טבלת ערך המקום">
      <p class="place-value-structure-label">בית המספרים</p>

      <div class="pv-columns-row" id="pv-columns-row" role="group" aria-label="טורי ערך המקום">

        <!-- יחידות column (rightmost in RTL) -->
        <div class="pv-column" data-place="units" aria-label="טור יחידות">
          <div class="pv-column-header">
            יחידות
            <span class="pv-count-badge" aria-live="polite"></span>
          </div>
          <div class="pv-drop-zone" id="drop-units"
               role="group" aria-label="אזור גרירה — יחידות">
          </div>
        </div>

        <!-- עשרות column -->
        <div class="pv-column" data-place="tens" aria-label="טור עשרות">
          <div class="pv-column-header">
            עשרות
            <span class="pv-count-badge" aria-live="polite"></span>
          </div>
          <div class="pv-drop-zone" id="drop-tens"
               role="group" aria-label="אזור גרירה — עשרות">
          </div>
        </div>

        <!-- מאות column -->
        <div class="pv-column" data-place="hundreds" aria-label="טור מאות">
          <div class="pv-column-header">
            מאות
            <span class="pv-count-badge" aria-live="polite"></span>
          </div>
          <div class="pv-drop-zone" id="drop-hundreds"
               role="group" aria-label="אזור גרירה — מאות">
          </div>
        </div>

        <!-- אלפים column (leftmost in RTL) -->
        <div class="pv-column" data-place="thousands" aria-label="טור אלפים">
          <div class="pv-column-header">
            אלפים
            <span class="pv-count-badge" aria-live="polite"></span>
          </div>
          <div class="pv-drop-zone" id="drop-thousands"
               role="group" aria-label="אזור גרירה — אלפים">
          </div>
        </div>

      </div>



      <!-- Live total value display (updates as blocks are placed) -->
      <div id="pv-value-display"
           style="text-align:center;margin-top:var(--space-4);
                  font-size:var(--font-size-2xl);font-weight:900;
                  color:var(--color-primary);min-height:1.5em;
                  transition:all var(--transition-base);"
           aria-live="polite" aria-label="ערך כולל">
      </div>

      <!-- ── Block Palette (Docked) ── -->
      <div class="block-palette" id="block-palette" role="toolbar" aria-label="לוח הקוביות — גרור לטבלה">
        <div class="palette-drag-handle" id="palette-drag-handle">
          <span class="d-flex align-items-center gap-2"><i class="fa-solid fa-grip-lines"></i> מחסן קוביות</span>
          <button id="btn-detach-palette" class="btn btn-sm btn-outline-secondary rounded-circle" style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;" aria-label="הפרד חלון" title="הפרד חלון">
            <i class="fa-solid fa-clone"></i>
          </button>
        </div>

      <div class="palette-blocks">
        <!-- יחידה — unit cube representation -->
        <div class="palette-item">
          <div class="math-block math-block--unit in-palette"
               data-place="units"
               draggable="true"
               role="button"
               tabindex="0"
               aria-label="גרור יחידה אחת לטבלה">
          </div>
          <span class="palette-item-label">יחידה (1)</span>
        </div>

        <!-- עשרת — ten-rod representation -->
        <div class="palette-item">
          <div class="math-block math-block--ten in-palette"
               data-place="tens"
               draggable="true"
               role="button"
               tabindex="0"
               aria-label="גרור עשרת לטבלה">
          </div>
          <span class="palette-item-label">עשרת (10)</span>
        </div>

        <!-- מאה — hundred-flat representation -->
        <div class="palette-item">
          <div class="math-block math-block--hundred in-palette"
               data-place="hundreds"
               draggable="true"
               role="button"
               tabindex="0"
               aria-label="גרור מאה לטבלה">
          </div>
          <span class="palette-item-label">מאה (100)</span>
        </div>

        <!-- אלף — thousand-cube representation -->
        <div class="palette-item">
          <div class="math-block math-block--thousand in-palette"
               data-place="thousands"
               draggable="true"
               role="button"
               tabindex="0"
               aria-label="גרור אלף לטבלה">
          </div>
          <span class="palette-item-label">אלף (1000)</span>
        </div>

        <!-- Trash zone for dragging out blocks -->
        <div class="trash-zone" id="trash-zone" role="button" aria-label="גרור לכאן כדי למחוק">
          🗑️
        </div>
      </div>
      
    </div>
  </div>

  </main>

  <!-- ── Support Palette (חלון עזרה — activated on request or hesitation alert) ──
       NEVER auto-opens without student's knowledge during normal flow. ── -->
  <div class="support-palette" id="support-palette"
       role="dialog" aria-modal="true" aria-label="חלון עזרה"
       aria-hidden="true">

    <div class="support-palette-header">
      <h2 class="support-palette-title">איך תרצה לקבל עזרה?</h2>
      <button class="support-palette-close"
              id="support-palette-close"
              aria-label="סגור חלון עזרה">✕</button>
    </div>

    <div class="support-options" role="group" aria-label="אפשרויות עזרה">

      <!-- Option 1: Metacognitive hint -->
      <button class="support-option" data-support="metacognitive" id="support-metacognitive">
        <span class="support-option-icon" aria-hidden="true">💭</span>
        <span class="support-option-title">רמז לחשיבה</span>
        <span class="support-option-desc">שאלה שתעזור לי לבדוק את עצמי</span>
      </button>

      <!-- Option 2: Closed Socratic guide -->
      <button class="support-option" data-support="socratic" id="support-socratic">
        <span class="support-option-icon" aria-hidden="true">🔍</span>
        <span class="support-option-title">שאלה מנחה</span>
        <span class="support-option-desc">שאלה שתפרק את הבעיה לשלבים</span>
      </button>

      <!-- Option 3: Worked example -->
      <button class="support-option" data-support="worked_example" id="support-worked-example">
        <span class="support-option-icon" aria-hidden="true">📖</span>
        <span class="support-option-title">דוגמה פתורה</span>
        <span class="support-option-desc">דוגמה של תרגיל דומה עם הסבר</span>
      </button>

    </div>
  </div>



  <!-- ── Feedback Overlay (correct / incorrect animations) ── -->
  <div class="feedback-overlay" id="feedback-overlay" role="status" aria-live="assertive">
  </div>

  <!-- ── Visual Socratic Organizer (Scaffolding Modal) ── -->
  <div class="socratic-modal" id="socratic-modal" role="dialog" aria-hidden="true">
    <div class="socratic-modal-content">
      <h2 id="socratic-modal-title">חונך דיגיטלי</h2>
      <div id="socratic-modal-visuals" class="socratic-visual-container">
        <!-- Graphic organizers will be injected here by app.js -->
      </div>
      <button class="btn-proceed" style="margin-top:20px;" onclick="document.getElementById('socratic-modal').classList.remove('open')">הבנתי, חזרה לתרגיל</button>
    </div>
  </div>

  <!-- Floating navigation removed, buttons moved to topbar -->

  <!-- DEV Skip Button (bottom left corner) -->
  <button id="dev-skip-btn" 
          onclick="App && App.devSkipTask && App.devSkipTask()" 
          style="position:fixed; bottom:10px; left:10px; font-size:10px; background:rgba(0,0,0,0.1); border:none; padding:4px 8px; border-radius:4px; color:var(--color-text-muted); cursor:pointer; z-index:9999;">
    ⏭ דלג (מפתח)
  </button>

  <!-- ── JavaScript Modules (load order matters) ── -->
  <!-- Premium UI Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Core App Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/rrweb@latest/dist/rrweb.min.js"></script>
  <script src="../js/session.js"></script>
  <script src="../js/student-logger.js"></script>
  <script src="../js/radar.js"></script>
  <script src="../js/manipulatives.js"></script>
  <script src="../js/qmatrix.js"></script>
  <script src="../js/app.js"></script>

</body>
</html>
