<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מתמטיקאור — כניסה למערכת</title>
  <meta name="description" content="סביבת הלמידה מתמטיקאור — כניסה מאובטחת לתלמידים, מורים ומנהלי מערכת">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">

  <!-- Decorative animated background orbs (non-interactive) -->
  <div class="bg-orb bg-orb-1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-3" aria-hidden="true"></div>

  <main class="login-container" role="main">

    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-icon" aria-hidden="true">
        <span class="logo-symbol">מ</span>
      </div>
      <div class="logo-text">
        <h1 class="app-name">מתמטיקאור</h1>
        <p class="app-tagline">סביבת למידה מוגברת טכנולוגיה</p>
      </div>
    </div>

    <!-- ── Role Selection ── -->
    <div class="login-card" id="role-selection" role="region" aria-label="בחירת סוג כניסה">
      <h2 class="card-title">כניסה למערכת</h2>
      <p class="card-subtitle">בחר את סוג הכניסה שלך</p>

      <div class="role-buttons" role="group" aria-label="בחר תפקיד">
        <button class="role-btn role-btn--student"
                id="btn-student"
                onclick="showLoginForm('student')"
                aria-label="כניסת תלמיד">
          <span class="role-icon" aria-hidden="true">🎓</span>
          <span class="role-label">תלמיד</span>
        </button>
        <button class="role-btn role-btn--teacher"
                id="btn-teacher"
                onclick="showLoginForm('teacher')"
                aria-label="כניסת מורה">
          <span class="role-icon" aria-hidden="true">📊</span>
          <span class="role-label">מורה</span>
        </button>
        <button class="role-btn role-btn--admin"
                id="btn-admin"
                onclick="showLoginForm('admin')"
                aria-label="כניסת מנהל מערכת">
          <span class="role-icon" aria-hidden="true">⚙️</span>
          <span class="role-label">מנהל מערכת</span>
        </button>
      </div>
    </div>

    <!-- ── Mock Transparent SSO ── -->
    <div class="login-card login-form-card hidden"
         id="sso-mock-card"
         role="region"
         aria-label="התחברות שקופה">
      <button class="back-btn" onclick="showRoleSelection()" aria-label="חזרה לבחירת תפקיד">
        ← חזרה
      </button>
      <div class="form-header">
        <h2 class="card-title" id="sso-role-title">הזדהות שקופה מול Google Workspace</h2>
      </div>
      <div style="text-align:center; padding: 20px;">
        <p style="margin-bottom:20px; font-size:14px; color:rgba(255,255,255,0.7);">מערכת ה-SSO מזהה אותך אוטומטית לפי חשבון הגוגל הבית-ספרי שלך. אין צורך בסיסמה.</p>
        <button class="submit-btn" id="sso-login-btn" onclick="executeMockSSO()" style="background: white; color: #333; display: flex; align-items: center; justify-content: center; gap: 10px;">
          <svg viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg"><g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)"><path fill="#4285F4" d="M -3.264 51.509 C -3.264 50.719 -3.334 49.969 -3.454 49.239 L -14.754 49.239 L -14.754 53.749 L -8.284 53.749 C -8.574 55.229 -9.424 56.479 -10.684 57.329 L -10.684 60.329 L -6.824 60.329 C -4.564 58.239 -3.264 55.159 -3.264 51.509 Z"/><path fill="#34A853" d="M -14.754 63.239 C -11.514 63.239 -8.804 62.159 -6.824 60.329 L -10.684 57.329 C -11.764 58.049 -13.134 58.489 -14.754 58.489 C -17.884 58.489 -20.534 56.369 -21.484 53.529 L -25.464 53.529 L -25.464 56.619 C -23.494 60.539 -19.444 63.239 -14.754 63.239 Z"/><path fill="#FBBC05" d="M -21.484 53.529 C -21.734 52.809 -21.864 52.039 -21.864 51.239 C -21.864 50.439 -21.724 49.669 -21.484 48.949 L -21.484 45.859 L -25.464 45.859 C -26.284 47.479 -26.754 49.299 -26.754 51.239 C -26.754 53.179 -26.284 54.999 -25.464 56.619 L -21.484 53.529 Z"/><path fill="#EA4335" d="M -14.754 43.989 C -12.984 43.989 -11.404 44.599 -10.154 45.789 L -6.734 42.369 C -8.804 40.429 -11.514 39.239 -14.754 39.239 C -19.444 39.239 -23.494 41.939 -25.464 45.859 L -21.484 48.949 C -20.534 46.109 -17.884 43.989 -14.754 43.989 Z"/></g></svg>
          התחברות מהירה (Mock SSO)
        </button>
      </div>
    </div>

  </main>

  <script>
    /* global showLoginForm, showRoleSelection, executeMockSSO, sessionStorage, selectedRole */
    /* ──────────────────────────────────────────
       Gateway Login Logic
       Phase A: Student login is fully functional.
       Teacher + Admin: placeholder alerts (Phase B/C).
    ────────────────────────────────────────── */

    /* Demo credentials for development/demonstration.
       In production, authentication is server-side. */
    const DEMO_USERS = {
      'user1': { password: '10203040', name: 'משתמש 1', session: 1, classMode: 'regular' },
      'user2': { password: '10203040', name: 'משתמש 2', session: 1, classMode: 'regular' },
      'user3': { password: '10203040', name: 'משתמש 3', session: 1, classMode: 'regular' },
      'user4': { password: '10203040', name: 'משתמש 4', session: 1, classMode: 'regular' },
      'user5': { password: '10203040', name: 'משתמש 5', session: 1, classMode: 'regular' },
      'user6': { password: '10203040', name: 'משתמש 6', session: 1, classMode: 'regular' },
      'user7': { password: '10203040', name: 'משתמש 7', session: 1, classMode: 'regular' },
      'user8': { password: '10203040', name: 'משתמש 8', session: 1, classMode: 'regular' },
      'pilot': { password: '10203040', name: 'פיילוט תלמיד', session: 1, classMode: 'regular' }
    };

    let selectedRole = null;

    /* Show a specific login form, hide role selection */
    function showLoginForm(role) {
      document.getElementById('role-selection').classList.add('hidden');
      const formEl = document.getElementById('sso-mock-card');
      
      let title = 'הזדהות שקופה מול Google Workspace';
      if(role === 'student') title = 'כניסת תלמיד - זיהוי אוטומטי';
      if(role === 'teacher') title = 'כניסת מורה - זיהוי אוטומטי';
      if(role === 'admin') title = 'כניסת מנהל - זיהוי אוטומטי';
      
      document.getElementById('sso-role-title').textContent = title;
      selectedRole = role;

      formEl.classList.remove('hidden');
      formEl.classList.add('fade-in');
    }

    /* Return to role selection */
    function showRoleSelection() {
      document.getElementById('sso-mock-card').classList.add('hidden');
      document.getElementById('sso-mock-card').classList.remove('fade-in');
      const roleEl = document.getElementById('role-selection');
      roleEl.classList.remove('hidden');
      roleEl.classList.add('fade-in');
    }

    /* Mock SSO Execution based on Role Routing (No passwords needed) */
    function executeMockSSO() {
      if (selectedRole === 'student') {
        const username = prompt("אנא הזן שם משתמש (לדוגמה: user1):");
        if (!username) return;
        const password = prompt("אנא הזן קוד סודי:");
        if (!password) return;
        
        const user = DEMO_USERS[username];
        if (user && user.password === password) {
          sessionStorage.setItem('mathematicor_student', JSON.stringify({
            name:       user.name,
            username:   username,
            session:    user.session,
            classMode:  user.classMode,
            loginTime:  Date.now(),
            taskIndex:  0
          }));
        } else {
          alert("שם המשתמש או הסיסמה שגויים.");
          return;
        }
      }

      const btn = document.getElementById('sso-login-btn');
      btn.textContent = 'מתחבר בצורה שקופה...';
      btn.style.opacity = '0.7';

      setTimeout(() => {
        if (selectedRole === 'student') {
          window.location.href = 'student/workspace.html';
        } else if (selectedRole === 'teacher') {
          window.location.href = 'teacher/dashboard.html';
        } else if (selectedRole === 'admin') {
          window.location.href = 'admin/index.html';
        }
      }, 600);
    }

    /* Keyboard: Enter on role buttons */
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') showRoleSelection();
    });
  </script>
</body>
</html>
