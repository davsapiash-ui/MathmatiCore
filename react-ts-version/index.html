  <head>
    <meta charset="UTF-8" />

    <title>מתמטיקאור | מאירים את הדרך להצלחה</title>
    <script>
      // Force cache flush once for the user to avoid incognito tricks
      if (!localStorage.getItem('mc_cache_flush_v3')) {
        localStorage.clear();
        sessionStorage.clear();
        localStorage.setItem('mc_cache_flush_v3', 'true');
        window.location.reload(true);
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
