name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: react-ts-version/package-lock.json

      - name: Install dependencies
        run: cd react-ts-version && npm ci --legacy-peer-deps

      - name: Build
        run: cd react-ts-version && npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MATHIMATICORE }}

      - name: Deploy to Firebase
        run: npx --yes firebase-tools@13 deploy --only hosting,database --project mathimaticore --non-interactive
