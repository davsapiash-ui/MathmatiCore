name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: react-ts-version/package-lock.json

      - name: Install dependencies
        working-directory: react-ts-version
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: react-ts-version
        run: npm run build


      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MATHIMATICORE }}

      - name: Deploy to Firebase Hosting
        run: npx --yes firebase-tools@13 deploy --only hosting --project mathimaticore --non-interactive
