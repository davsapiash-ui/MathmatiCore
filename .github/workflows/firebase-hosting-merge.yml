name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: react-ts-version/package-lock.json

      - name: Install dependencies
        working-directory: react-ts-version
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: react-ts-version
        run: npm run build

      - name: Verify dist exists
        run: ls -la react-ts-version/dist/

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MATHIMATICORE }}

      - name: Deploy Hosting to Firebase
        run: npx --yes firebase-tools@13 deploy --only hosting --project mathimaticore --non-interactive --debug 2>&1 | tail -50
        continue-on-error: true

      - name: Deploy Database Rules to Firebase
        run: npx --yes firebase-tools@13 deploy --only database --project mathimaticore --non-interactive --debug 2>&1 | tail -50
        continue-on-error: true

      - name: Final deploy (fail on error)
        run: npx --yes firebase-tools@13 deploy --only hosting,database --project mathimaticore --non-interactive
