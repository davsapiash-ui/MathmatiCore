# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd react-ts-version && npm ci --legacy-peer-deps && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MATHIMATICORE }}
          channelId: live
          projectId: mathimaticore

      # Deploy Realtime Database security rules (hosting action above covers hosting only —
      # without this step rule changes in the repo never reach the live database).
      - name: Deploy database rules
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MATHIMATICORE }}' > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx --yes firebase-tools deploy --only database --project mathimaticore --non-interactive
          rm -f "$RUNNER_TEMP/sa.json"
